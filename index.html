<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ESP32-CAM Viewer - Locomotora</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #1a1a2e, #0f3460);
      color: #eee;
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    }
    .panel {
      text-align: center;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h2 {
      color: #ffd700;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
      margin-bottom: 30px;
      font-size: 2em;
      width: 100%;
      text-align: center;
    }
    
    /* Locomotora contenedor */
    .locomotive {
      position: relative;
      width: min(90vw, 300px);
      background: linear-gradient(to bottom, #c41e3a 0%, #8b0000 100%);
      border-radius: 20px 20px 0 0;
      padding: 30px 20px 40px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.7);
      border: 4px solid #222;
    }
    
    /* Techo de la locomotora */
    .locomotive::before {
      content: '';
      position: absolute;
      top: -25px;
      left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 25px;
      background: linear-gradient(to right, #8b0000, #c41e3a, #8b0000);
      border-radius: 10px 10px 0 0;
      border: 3px solid #333;
      border-bottom: none;
    }
    
    /* Base de la locomotora */
    .locomotive::after {
      content: '';
      position: absolute;
      bottom: -20px;
      left: 0;
      right: 0;
      height: 20px;
      background: linear-gradient(to bottom, #333, #111);
      border-radius: 0 0 15px 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.9);
    }
    
    /* Marco de la cámara */
    .camera-frame {
      position: relative;
      background: linear-gradient(135deg, #2c3e50, #34495e);
      padding: 15px;
      border-radius: 15px;
      border: 5px solid #1a1a1a;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 5px 15px rgba(0,0,0,0.3);
    }
    
    /* Tornillos decorativos */
    .camera-frame::before,
    .camera-frame::after {
      content: '⊗';
      position: absolute;
      color: #666;
      font-size: 20px;
      font-weight: bold;
    }
    .camera-frame::before {
      top: 5px;
      left: 5px;
    }
    .camera-frame::after {
      top: 5px;
      right: 5px;
    }
    
    img {
      display: block;
      max-width: 100%;
      width: 100%;
      height: auto;
      border: 3px solid #000;
      background: #000;
      image-rendering: crisp-edges;
      border-radius: 8px;
    }
    
    /* Luces frontales */
    .lights {
      display: flex;
      justify-content: space-around;
      margin-top: 25px;
      gap: 10px;
    }
    
    .light {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 3px solid #222;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.6), inset 0 0 10px rgba(255, 255, 255, 0.3);
      animation: blink 2s infinite alternate;
    }
    
    .light.yellow {
      background: radial-gradient(circle at 30% 30%, #fff, #ffd700);
    }
    
    .light.white {
      background: radial-gradient(circle at 30% 30%, #fff, #e0e0e0);
      animation-delay: 1s;
    }

    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 18px;
      gap: 8px;
    }

    .led-toggle {
      cursor: pointer;
      padding: 10px 16px;
      border-radius: 8px;
      border: 2px solid #111;
      background: linear-gradient(to bottom, #f1c40f, #d4ac0d);
      color: #111;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.35);
    }

    .led-toggle.on {
      background: linear-gradient(to bottom, #7bed9f, #2ecc71);
    }

    .led-status {
      font-size: 0.85em;
      color: #eaeaea;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
      padding: 20px;
      box-sizing: border-box;
    }

    .modal.show {
      display: flex;
    }

    .modal-card {
      background: #1b1b1b;
      border: 2px solid #333;
      border-radius: 12px;
      padding: 18px 20px;
      max-width: 360px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
    }

    .modal-title {
      margin: 0 0 8px;
      font-size: 1.1em;
      color: #ffd700;
    }

    .modal-text {
      margin: 0 0 14px;
      font-size: 0.9em;
      color: #eaeaea;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .modal-btn {
      cursor: pointer;
      border: 2px solid #111;
      border-radius: 8px;
      padding: 8px 14px;
      font-weight: bold;
      background: linear-gradient(to bottom, #f1c40f, #d4ac0d);
      color: #111;
    }
    
    @keyframes blink {
      0% { opacity: 1; box-shadow: 0 0 20px rgba(255, 215, 0, 0.6); }
      100% { opacity: 0.7; box-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }
    }
    
    /* Ventanas laterales */
    .windows {
      position: absolute;
      top: 50%;
      width: 30px;
      height: 80px;
      background: linear-gradient(135deg, #87ceeb, #4682b4);
      border: 3px solid #1a1a1a;
      border-radius: 5px;
      transform: translateY(-50%);
      box-shadow: inset 0 0 10px rgba(255,255,255,0.3);
    }
    
    .windows.left {
      left: -35px;
    }
    
    .windows.right {
      right: -35px;
    }
    
    /* Líneas decorativas */
    .stripes {
      position: absolute;
      top: 15px;
      left: 20px;
      right: 20px;
      height: 3px;
      background: linear-gradient(to right, transparent, #ffd700, transparent);
    }
    
    .stripes::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(to right, transparent, #ffd700, transparent);
    }
    
    /* Parachoques inferior */
    .bumper {
      position: absolute;
      bottom: -15px;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      height: 10px;
      background: linear-gradient(to bottom, #888, #333);
      border-radius: 5px;
      border: 2px solid #000;
    }
    
    @media (max-width: 650px) {
      .windows {
        display: none;
      }
      h2 {
        font-size: 1.5em;
      }
    }
  </style>
</head>
<body>
  <div class="panel">
    <h2>🚂 Cámara Locomotora ESP32-CAM 🚂</h2>
    <div class="locomotive">
      <div class="stripes"></div>
      <div class="windows left"></div>
      <div class="windows right"></div>
      
      <div class="camera-frame">
        <img id="cam" alt="Vista frontal locomotora" />
      </div>
      
      <div class="lights">
        <div class="light yellow"></div>
        <div class="light white"></div>
        <div class="light yellow"></div>
      </div>

      <div class="controls">
        <button id="ledToggle" class="led-toggle" type="button">Encender luz</button>
        <div id="ledStatus" class="led-status">Luz: OFF</div>
      </div>
      
      <div class="bumper"></div>
    </div>
  </div>

  <div id="streamModal" class="modal" aria-hidden="true">
    <div class="modal-card">
      <h3 class="modal-title">Stream no disponible</h3>
      <p id="streamModalText" class="modal-text"></p>
      <div class="modal-actions">
        <button id="streamRetry" class="modal-btn" type="button">Reintentar</button>
        <button id="streamClose" class="modal-btn" type="button">Cerrar</button>
      </div>
    </div>
  </div>

  <script>
    const cam = document.getElementById('cam');
    const ledToggle = document.getElementById('ledToggle');
    const ledStatus = document.getElementById('ledStatus');
    const streamModal = document.getElementById('streamModal');
    const streamModalText = document.getElementById('streamModalText');
    const streamRetry = document.getElementById('streamRetry');
    const streamClose = document.getElementById('streamClose');
    const CAMERA_IP = '192.168.0.100';
    const MQTT_HOST = 'mqtt-dashboard.com';
    const MQTT_WS_PORT = 8884;
    const MQTT_CLIENT_ID = 'vamosZidane';
    const MQTT_WS_PATH = '/mqtt';
    const MQTT_TOPIC_SET = 'tren/esp32cam/led/set';
    const MQTT_TOPIC_STATE = 'tren/esp32cam/led/state';
    const MQTT_TOPIC_GET = 'tren/esp32cam/led/get';
    const STREAM_RECONNECT_MS = 5500;
    const RECONNECT_DELAY_MS = 1200;
    let reconnectTimer = null;
    let mqttClient = null;
    let ledState = false;
    let mqttReady = false;
    let reconnectInFlight = false;
    let streamPaused = false;
    const IS_FILE_PROTOCOL = window.location.protocol === 'file:';
    const PAHO_CDN_URLS = [
      'https://cdn.jsdelivr.net/npm/paho-mqtt@1.0.3/mqttws31.min.js'
    ];

    function streamUrl() {
      return `http://${CAMERA_IP}/stream?t=${Date.now()}`;
    }

    function reconnect() {
      console.log('Reconectando stream...');
      cam.src = '';
      setTimeout(() => {
        cam.src = streamUrl();
      }, 50);
    }

    function scheduleReconnect() {
      if (streamPaused) {
        return;
      }
      if (reconnectInFlight) {
        return;
      }
      reconnectInFlight = true;
      if (reconnectTimer) {
        clearTimeout(reconnectTimer);
      }
      reconnectTimer = setTimeout(() => {
        reconnectInFlight = false;
        reconnect();
      }, RECONNECT_DELAY_MS);
    }

    function updateLedUi(on, source) {
      ledState = on;
      ledToggle.classList.toggle('on', on);
      ledToggle.textContent = on ? 'Apagar luz' : 'Encender luz';
      ledStatus.textContent = `Luz: ${on ? 'ON' : 'OFF'}${source ? ` (${source})` : ''}`;
    }

    function showStreamModal(message) {
      streamModalText.textContent = message;
      streamModal.classList.add('show');
      streamModal.setAttribute('aria-hidden', 'false');
    }

    function hideStreamModal() {
      streamModal.classList.remove('show');
      streamModal.setAttribute('aria-hidden', 'true');
    }

    function loadPahoScript() {
      return new Promise((resolve, reject) => {
        let index = 0;

        function tryNext() {
          if (index >= PAHO_CDN_URLS.length) {
            reject(new Error('No se pudo cargar Paho MQTT'));
            return;
          }
          const script = document.createElement('script');
          script.src = PAHO_CDN_URLS[index];
          script.async = true;
          script.onload = () => resolve();
          script.onerror = () => {
            index += 1;
            tryNext();
          };
          document.head.appendChild(script);
        }

        tryNext();
      });
    }

    function connectMqtt() {
      mqttClient = new Paho.MQTT.Client(MQTT_HOST, MQTT_WS_PORT, MQTT_WS_PATH, MQTT_CLIENT_ID);

      mqttClient.onConnectionLost = (response) => {
        mqttReady = false;
        ledStatus.textContent = response && response.errorMessage
          ? `MQTT desconectado: ${response.errorMessage}`
          : 'MQTT desconectado';
      };

      mqttClient.onMessageArrived = (message) => {
        if (message.destinationName !== MQTT_TOPIC_STATE) {
          return;
        }
        const payload = String(message.payloadString).trim().toUpperCase();
        if (payload === 'ON') {
          updateLedUi(true, 'MQTT');
        } else if (payload === 'OFF') {
          updateLedUi(false, 'MQTT');
        }
      };

      mqttClient.connect({
        useSSL: true,
        cleanSession: true,
        onSuccess: () => {
          mqttReady = true;
          mqttClient.subscribe(MQTT_TOPIC_STATE);
          const message = new Paho.MQTT.Message('STATE');
          message.destinationName = MQTT_TOPIC_GET;
          mqttClient.send(message);
          ledStatus.textContent = 'MQTT conectado';
        },
        onFailure: (error) => {
          mqttReady = false;
          ledStatus.textContent = error && error.errorMessage
            ? `MQTT error: ${error.errorMessage}`
            : 'MQTT error';
          console.error('MQTT connect error', error);
          setTimeout(connectMqtt, 4000);
        }
      });
    }

    let lastErrorTime = 0;

    // Reconectar si hay error, con enfriamiento para evitar loops
    cam.addEventListener('error', () => {
      const now = Date.now();
      if (now - lastErrorTime < 10000) {
        return;
      }
      lastErrorTime = now;
      streamPaused = true;
      showStreamModal('El stream esta ocupado o la conexion se corto. Cierra otras pestañas y pulsa Reintentar.');
      scheduleReconnect();
    });

    streamRetry.addEventListener('click', () => {
      streamPaused = false;
      hideStreamModal();
      reconnect();
    });

    streamClose.addEventListener('click', () => {
      hideStreamModal();
    });

    ledToggle.addEventListener('click', () => {
      if (!mqttClient || !mqttReady) {
        ledStatus.textContent = 'MQTT no conectado';
        return;
      }
      const nextState = !ledState;
      const message = new Paho.MQTT.Message(nextState ? 'ON' : 'OFF');
      message.destinationName = MQTT_TOPIC_SET;
      mqttClient.send(message);
      updateLedUi(nextState, 'Web');
    });

    if (IS_FILE_PROTOCOL) {
      ledStatus.textContent = 'MQTT no disponible (abre con servidor HTTP)';
    }

    // Iniciar stream automáticamente
    reconnect();
    if (!IS_FILE_PROTOCOL) {
      loadPahoScript()
        .then(() => connectMqtt())
        .catch(() => {
          ledStatus.textContent = 'MQTT no disponible';
        });
    }
  </script>
</body>
</html>
