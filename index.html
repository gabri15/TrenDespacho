<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ESP32-CAM Viewer</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    .panel {
      width: min(100vw, 900px);
      padding: 16px;
      box-sizing: border-box;
      text-align: center;
    }
    img {
      max-width: 480px;
      width: 100%;
      height: auto;
      border: 1px solid #333;
      background: #000;
      image-rendering: crisp-edges;
    }
  </style>
</head>
<body>
  <div class="panel">
    <h2>Cámara ESP32-CAM</h2>
    <img id="cam" alt="Captura cámara" />
  </div>

  <script>
    const cam = document.getElementById('cam');
    const CAMERA_IP = '192.168.0.100';
    const STREAM_RECONNECT_MS = 5500;
    const FREEZE_TIMEOUT_MS = 3000;
    let reconnectTimer = null;
    let freezeWatchdog = null;
    let lastUpdate = Date.now();

    function streamUrl() {
      return `http://${CAMERA_IP}/stream?t=${Date.now()}`;
    }

    function reconnect() {
      console.log('Reconectando stream...');
      cam.src = streamUrl();
    }

    function scheduleReconnect() {
      if (reconnectTimer) {
        clearTimeout(reconnectTimer);
      }
      reconnectTimer = setTimeout(() => {
        reconnect();
        scheduleReconnect();
      }, STREAM_RECONNECT_MS);
    }

    function startFreezeWatchdog() {
      if (freezeWatchdog) {
        clearInterval(freezeWatchdog);
      }
      freezeWatchdog = setInterval(() => {
        if (Date.now() - lastUpdate > FREEZE_TIMEOUT_MS) {
          console.warn('Stream congelado, reconectando...');
          reconnect();
          scheduleReconnect();
        }
      }, 1000);
    }

    // Detectar cuando la imagen se actualiza
    cam.addEventListener('load', () => {
      lastUpdate = Date.now();
    });

    // Reconectar inmediatamente si hay error
    cam.addEventListener('error', () => {
      console.error('Error cargando stream, reconectando...');
      setTimeout(reconnect, 500);
    });

    // Iniciar stream automáticamente
    reconnect();
    scheduleReconnect();
    startFreezeWatchdog();
  </script>
</body>
</html>
